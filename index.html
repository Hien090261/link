<!DOCTYPE html>
<html>
<head>
<title>Task Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f1c2e;
color:white;
text-align:center;
padding-top:50px;
}

.box{
background:#1e2b44;
padding:30px;
width:350px;
margin:auto;
border-radius:10px;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
background:#6c7cff;
color:white;
border-radius:5px;
cursor:pointer;
}

input{
padding:10px;
width:90%;
margin-top:10px;
}

.task{
margin-top:15px;
background:#2c3a57;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Task Dashboard</h1>

<div class="box">

<h3>Register / Login</h3>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="user"></p>

<h3>Tasks</h3>

<div class="task">
Task 1
<br>
<button onclick="earn()">Earn</button>
</div>

<div class="task">
Task 2
<br>
<button onclick="earn()">Earn</button>
</div>

<div class="task">
Task 3
<br>
<button onclick="earn()">Earn</button>
</div>

<p id="status"></p>

</div>

<script>

let links = [

"https://uptolink.one/O6E4CDUB",
"https://uptolink.one/KFsVT",
"https://uptolink.one/PY6BEE",
"https://uptolink.one/TLFtf",
"https://uptolink.one/fqH5i",
"https://uptolink.one/H7Wr"

];

function earn(){

let random = Math.floor(Math.random()*links.length);

window.open(links[random]);

document.getElementById("status").innerText="Task opened";

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDWwTbMfKk9wXa5uaW6eIvEFfGLQ2ClnEg",
authDomain: "link-task-32a86.firebaseapp.com",
projectId: "link-task-32a86",
storageBucket: "link-task-32a86.firebasestorage.app",
messagingSenderId: "859078395434",
appId: "1:859078395434:web:4692a5d5e09d7ab4716553"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>alert("Register success"))
.catch(e=>alert(e.message));

}

window.login = function(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>alert("Login success"))
.catch(e=>alert(e.message));

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("user").innerText="Logged in: "+user.email;

}

});

</script>

</body>
</html>
