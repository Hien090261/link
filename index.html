<!DOCTYPE html>
<html>
<head>
<title>Link Task</title>

<style>

body{
font-family:Arial;
background:#0f1c2e;
color:white;
text-align:center;
padding-top:60px;
}

.box{
background:#1e2b44;
padding:30px;
width:350px;
margin:auto;
border-radius:10px;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
background:#6c7cff;
color:white;
border-radius:5px;
cursor:pointer;
}

input{
padding:10px;
width:90%;
margin-top:10px;
}

.task{
margin-top:15px;
background:#2c3a57;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="box" id="loginBox">

<h2>Login</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div>

<!-- DASHBOARD -->

<div class="box" id="taskBox" style="display:none;">

<h2>Task Dashboard</h2>

<p id="user"></p>

<p>Earn count: <span id="count">0</span></p>

<button onclick="logout()">Logout</button>

<div class="task">
Upto 3 Steps
<br>
<button onclick="earn3()">Earn</button>
</div>

<div class="task">
Upto 2 Steps
<br>
<button onclick="earn2()">Earn</button>
</div>

<br>

<button onclick="verifyTask()">Verify Task</button>

</div>

<script>

let count = 0
let canVerify = false

let upto3 = [

"https://uptolink.one/O6E4CDUB",
"https://uptolink.one/KFsVT",
"https://uptolink.one/PY6BEE"

]

let upto2 = [

"https://uptolink.one/1s2VD",
"https://uptolink.one/E9Mi2Kb",
"https://uptolink.one/2mPbEHb"

]

function earn3(){

let random = Math.floor(Math.random()*upto3.length)

window.open(upto3[random])

startVerify()

}

function earn2(){

let random = Math.floor(Math.random()*upto2.length)

window.open(upto2[random])

startVerify()

}

function startVerify(){

canVerify = false

alert("Complete the link then verify after 50 seconds")

setTimeout(()=>{

canVerify = true

alert("You can now verify the task")

},50000)

}

function verifyTask(){

if(canVerify){

count++

document.getElementById("count").innerText = count

alert("Task verified!")

canVerify = false

}else{

alert("Wait 50 seconds before verifying!")

}

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

const firebaseConfig = {

apiKey: "AIzaSyDWwTbMfKk9wXa5uaW6eIvEFfGLQ2ClnEg",
authDomain: "link-task-32a86.firebaseapp.com",
projectId: "link-task-32a86",
storageBucket: "link-task-32a86.firebasestorage.app",
messagingSenderId: "859078395434",
appId: "1:859078395434:web:4692a5d5e09d7ab4716553"

}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)

window.register = function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

createUserWithEmailAndPassword(auth,email,password)
.then(()=>alert("Register success"))
.catch(e=>alert(e.message))

}

window.login = function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,password)
.catch(e=>alert(e.message))

}

window.logout = function(){

signOut(auth)

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginBox").style.display="none"
document.getElementById("taskBox").style.display="block"

document.getElementById("user").innerText="Logged in: "+user.email

}else{

document.getElementById("loginBox").style.display="block"
document.getElementById("taskBox").style.display="none"

}

})

</script>

</body>
</html>
