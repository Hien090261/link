<!DOCTYPE html>
<html>
<head>
<title>Link Task</title>

<style>

body{
font-family:Arial;
background:#0f1c2e;
color:white;
text-align:center;
padding-top:60px;
}

.box{
background:#1e2b44;
padding:30px;
width:420px;
margin:auto;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
background:#6c7cff;
color:white;
border-radius:5px;
cursor:pointer;
}

input{
padding:10px;
width:90%;
margin-top:10px;
}

.task{
margin-top:15px;
background:#2c3a57;
padding:10px;
border-radius:6px;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:6px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="box" id="loginBox">

<h2>Login</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div>

<!-- DASHBOARD -->

<div class="box" id="taskBox" style="display:none">

<h2>Task Dashboard</h2>

<p id="user"></p>

<p>Earn count: <span id="count">0</span></p>

<button onclick="logout()">Logout</button>

<div class="task">

Upto 3 Steps<br>

<button onclick="earn3()">Earn</button>

</div>

<div class="task">

Upto 2 Steps<br>

<button onclick="earn2()">Earn</button>

</div>

<br>

<button onclick="verifyTask()">Verify Task</button>

</div>

<!-- ADMIN -->

<div class="box" id="adminBox" style="display:none">

<h2>Admin Panel</h2>

<table>

<tr>
<th>Email</th>
<th>Earn</th>
</tr>

<tbody id="userTable"></tbody>

</table>

</div>

<script>

let verifyTime=0

let upto3=[
"https://uptolink.one/O6E4CDUB",
"https://uptolink.one/KFsVT",
"https://uptolink.one/PY6BEE"
]

let upto2=[
"https://uptolink.one/1s2VD",
"https://uptolink.one/E9Mi2Kb",
"https://uptolink.one/2mPbEHb"
]

function startVerify(){

verifyTime=Date.now()+50000

localStorage.setItem("verifyTime",verifyTime)

alert("Complete task then return")

}

function earn3(){

let r=Math.floor(Math.random()*upto3.length)

window.open(upto3[r])

startVerify()

}

function earn2(){

let r=Math.floor(Math.random()*upto2.length)

window.open(upto2[r])

startVerify()

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyDWwTbMfKk9wXa5uaW6eIvEFfGLQ2ClnEg",
authDomain:"link-task-32a86.firebaseapp.com",
projectId:"link-task-32a86",
storageBucket:"link-task-32a86.firebasestorage.app",
messagingSenderId:"859078395434",
appId:"1:859078395434:web:4692a5d5e09d7ab4716553"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)

let uid=null

const ADMIN="nguyenthanhhien1333@gmail.com"

window.register=async function(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

let user=await createUserWithEmailAndPassword(auth,email,pass)

await setDoc(doc(db,"users",user.user.uid),{
email:email,
earn:0
})

alert("Register success")

}

window.login=function(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,pass)
.catch(e=>alert(e.message))

}

window.logout=function(){

signOut(auth)

}

window.verifyTask=async function(){

let saved=localStorage.getItem("verifyTime")

if(!saved || Date.now()<saved){

alert("Task not completed")

return

}

let ref=doc(db,"users",uid)

let snap=await getDoc(ref)

let earn=snap.data().earn+1

await updateDoc(ref,{earn:earn})

document.getElementById("count").innerText=earn

localStorage.removeItem("verifyTime")

alert("Task verified")

}

async function loadUsers(){

let table=document.getElementById("userTable")

table.innerHTML=""

let query=await getDocs(collection(db,"users"))

query.forEach(d=>{

let data=d.data()

table.innerHTML+=`<tr>
<td>${data.email}</td>
<td>${data.earn}</td>
</tr>`

})

}

onAuthStateChanged(auth,async(user)=>{

if(user){

uid=user.uid

document.getElementById("loginBox").style.display="none"
document.getElementById("taskBox").style.display="block"

document.getElementById("user").innerText="Logged in: "+user.email

let snap=await getDoc(doc(db,"users",uid))

if(snap.exists()){
document.getElementById("count").innerText=snap.data().earn
}

if(user.email.toLowerCase()===ADMIN.toLowerCase()){

document.getElementById("adminBox").style.display="block"

loadUsers()

}

}else{

document.getElementById("loginBox").style.display="block"
document.getElementById("taskBox").style.display="none"
document.getElementById("adminBox").style.display="none"

}

})

</script>

</body>
</html>
