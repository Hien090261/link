<!DOCTYPE html>
<html>
<head>
<title>Link Task</title>

<style>

body{
font-family:Arial;
background:#0f1c2e;
color:white;
text-align:center;
padding-top:60px;
}

.box{
background:#1e2b44;
padding:30px;
width:350px;
margin:auto;
border-radius:10px;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
background:#6c7cff;
color:white;
border-radius:5px;
cursor:pointer;
}

input{
padding:10px;
width:90%;
margin-top:10px;
}

.task{
margin-top:15px;
background:#2c3a57;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="box" id="loginBox">

<h2>Login</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div>

<div class="box" id="taskBox" style="display:none;">

<h2>Task Dashboard</h2>

<p id="user"></p>

<p>Earn count: <span id="count">0</span></p>

<button onclick="logout()">Logout</button>

<div class="task">
Upto 3 Steps
<br>
<button onclick="earn3()">Earn</button>
</div>

<div class="task">
Upto 2 Steps
<br>
<button onclick="earn2()">Earn</button>
</div>

<br>

<button onclick="verifyTask()">Verify Task</button>

</div>

<script>

let canVerify=false

let upto3=[
"https://uptolink.one/O6E4CDUB",
"https://uptolink.one/KFsVT",
"https://uptolink.one/PY6BEE"
]

let upto2=[
"https://uptolink.one/1s2VD",
"https://uptolink.one/E9Mi2Kb",
"https://uptolink.one/2mPbEHb"
]

function earn3(){

let random=Math.floor(Math.random()*upto3.length)

window.open(upto3[random])

startVerify()

}

function earn2(){

let random=Math.floor(Math.random()*upto2.length)

window.open(upto2[random])

startVerify()

}

function startVerify(){

canVerify=false

alert("Complete the task and come back to verify.")

setTimeout(()=>{

canVerify=true

},50000)

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

import { getFirestore,doc,setDoc,getDoc,updateDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyDWwTbMfKk9wXa5uaW6eIvEFfGLQ2ClnEg",
authDomain:"link-task-32a86.firebaseapp.com",
projectId:"link-task-32a86",
storageBucket:"link-task-32a86.firebasestorage.app",
messagingSenderId:"859078395434",
appId:"1:859078395434:web:4692a5d5e09d7ab4716553"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)

let userId=null

window.register=async function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let user=await createUserWithEmailAndPassword(auth,email,password)

await setDoc(doc(db,"users",user.user.uid),{

earn:0

})

alert("Register success")

}

window.login=function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,password)
.catch(e=>alert(e.message))

}

window.logout=function(){

signOut(auth)

}

window.verifyTask=async function(){

if(!canVerify){

alert("Task not completed yet. Please finish the link.")

return

}

let ref=doc(db,"users",userId)

let snap=await getDoc(ref)

let data=snap.data()

let newEarn=data.earn+1

await updateDoc(ref,{earn:newEarn})

document.getElementById("count").innerText=newEarn

alert("Task completed!")

canVerify=false

}

onAuthStateChanged(auth,async(user)=>{

if(user){

userId=user.uid

document.getElementById("loginBox").style.display="none"
document.getElementById("taskBox").style.display="block"

document.getElementById("user").innerText="Logged in: "+user.email

let snap=await getDoc(doc(db,"users",user.uid))

if(snap.exists()){

document.getElementById("count").innerText=snap.data().earn

}

}else{

document.getElementById("loginBox").style.display="block"
document.getElementById("taskBox").style.display="none"

}

})

</script>

</body>
</html>
