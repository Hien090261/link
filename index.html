<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Task Pro - Email Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen font-sans text-slate-800">

    <!-- NAVBAR -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 shadow-md flex justify-between items-center">
        <div class="text-2xl font-black text-indigo-700 tracking-tighter cursor-pointer" onclick="location.reload()">LINKTASK</div>
        <div id="auth-nav" class="flex items-center gap-4">
            <span id="user-display" class="hidden text-sm font-bold text-slate-600"></span>
            <button id="showLoginBtn" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg hover:bg-indigo-700 transition">Đăng Nhập</button>
            <button id="adminBtn" class="hidden bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-orange-600">Admin</button>
            <button id="logoutBtn" class="hidden text-slate-500 text-sm font-bold hover:text-red-500">Thoát</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        
        <!-- SECTION: FORM ĐĂNG NHẬP (MODAL-LIKE) -->
        <div id="auth-modal" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl relative">
                <button onclick="toggleAuthModal(false)" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
                <h2 id="auth-title" class="text-2xl font-black text-center mb-6">Đăng Nhập</h2>
                <div class="space-y-4">
                    <input type="email" id="emailInput" placeholder="Email của bạn" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-indigo-500 outline-none">
                    <input type="password" id="passwordInput" placeholder="Mật khẩu" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-indigo-500 outline-none">
                    <button id="authSubmitBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">Tiếp Tục</button>
                    <p class="text-center text-sm text-slate-500">
                        <span id="auth-switch-text">Chưa có tài khoản?</span> 
                        <button onclick="switchAuthMode()" id="auth-switch-btn" class="text-indigo-600 font-bold underline">Đăng ký ngay</button>
                    </p>
                </div>
            </div>
        </div>

        <!-- SECTION: TRANG CHỦ -->
        <section id="home-section" class="mt-12 text-center">
            <h1 class="text-5xl font-black text-white mb-6 drop-shadow-lg">Rút Gọn Link Email</h1>
            <div class="glass p-8 rounded-3xl shadow-2xl max-w-xl mx-auto">
                <div id="login-msg" class="text-slate-600 font-medium mb-4">Vui lòng đăng nhập để tạo link rút gọn!</div>
                <div id="link-form" class="hidden space-y-4">
                    <input type="url" id="targetUrlInput" placeholder="Dán link gốc (https://...)" class="w-full px-5 py-4 rounded-xl border-2 border-indigo-100 focus:border-indigo-500 outline-none text-lg">
                    <button id="shortenBtn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl text-xl shadow-xl hover:bg-indigo-700 transition">Tạo Link Vượt</button>
                </div>
                <div id="result" class="mt-6 hidden">
                    <div class="p-4 bg-green-50 rounded-xl border-2 border-green-200">
                        <div class="flex items-center gap-3">
                            <input type="text" id="shortUrlOutput" readonly class="flex-1 bg-transparent border-none outline-none text-indigo-700 font-mono font-bold">
                            <button id="copyBtn" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-lg font-bold">Copy</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION: TRANG CHỜ -->
        <section id="redirect-section" class="hidden mt-12 text-center">
            <div class="glass p-10 rounded-3xl shadow-2xl max-w-lg mx-auto">
                <h2 class="text-2xl font-bold mb-4">Đang chuẩn bị link...</h2>
                <div class="text-7xl font-black text-indigo-600 mb-6" id="countdown">10</div>
                <div id="cta" class="hidden">
                    <a id="targetBtn" href="#" class="inline-block w-full bg-indigo-600 text-white font-black py-4 rounded-2xl text-xl shadow-xl hover:bg-indigo-700 transition">TIẾP TỤC</a>
                </div>
            </div>
        </section>

        <!-- SECTION: ADMIN -->
        <section id="admin-section" class="hidden mt-12">
            <div class="glass p-8 rounded-3xl shadow-2xl">
                <h2 class="text-2xl font-black mb-6">Quản Lý Link</h2>
                <div id="links-list" class="space-y-3 text-sm"></div>
            </div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWwTbMFkK9wXa5uaW6eiVEfFGLQ2ClnEg",
            authDomain: "link-task-32a86.firebaseapp.com",
            projectId: "link-task-32a86",
            storageBucket: "link-task-32a86.firebasestorage.app",
            messagingSenderId: "859078395434",
            appId: "1:859078395434:web:67fba327c27cbc9e716553"
        };
        
        const ADMIN_EMAIL = "nguyenthanhhien1333@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLoginMode = true;

        // UI Elements
        const authModal = document.getElementById('auth-modal');
        const showLoginBtn = document.getElementById('showLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const adminBtn = document.getElementById('adminBtn');
        const userDisplay = document.getElementById('user-display');

        function toggleAuthModal(show) { authModal.classList.toggle('hidden', !show); }
        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? 'Đăng Nhập' : 'Đăng Ký';
            document.getElementById('auth-switch-text').textContent = isLoginMode ? 'Chưa có tài khoản?' : 'Đã có tài khoản?';
            document.getElementById('auth-switch-btn').textContent = isLoginMode ? 'Đăng ký ngay' : 'Đăng nhập';
        }

        showLoginBtn.onclick = () => toggleAuthModal(true);
        logoutBtn.onclick = () => auth.signOut();
        adminBtn.onclick = () => showSection('admin');

        // Auth Logic
        document.getElementById('authSubmitBtn').onclick = async () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            try {
                if (isLoginMode) await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
                toggleAuthModal(false);
            } catch (e) { alert('Lỗi: ' + e.message); }
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                showLoginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userDisplay.classList.remove('hidden');
                userDisplay.textContent = user.email;
                document.getElementById('login-msg').classList.add('hidden');
                document.getElementById('link-form').classList.remove('hidden');
                if (user.email === ADMIN_EMAIL) adminBtn.classList.remove('hidden');
            } else {
                showLoginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userDisplay.classList.add('hidden');
                adminBtn.classList.add('hidden');
                document.getElementById('login-msg').classList.remove('hidden');
                document.getElementById('link-form').classList.add('hidden');
            }
        });

        // Link Logic
        document.getElementById('shortenBtn').onclick = async () => {
            const url = document.getElementById('targetUrlInput').value;
            if (!url) return alert('Nhập link đã!');
            const doc = await db.collection('links').add({
                target: url,
                creator: auth.currentUser.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('shortUrlOutput').value = `${window.location.origin}${window.location.pathname}?id=${doc.id}`;
            document.getElementById('result').classList.remove('hidden');
        };

        // Redirect & Admin
        const params = new URLSearchParams(window.location.search);
        const linkId = params.get('id');
        if (linkId) {
            showSection('redirect');
            db.collection('links').doc(linkId).get().then(doc => {
                if (doc.exists) {
                    let count = 10;
                    const t = setInterval(() => {
                        count--;
                        document.getElementById('countdown').textContent = count;
                        if (count <= 0) {
                            clearInterval(t);
                            document.getElementById('cta').classList.remove('hidden');
                            document.getElementById('targetBtn').href = doc.data().target;
                        }
                    }, 1000);
                }
            });
        }

        async function loadAdminLinks() {
            const list = document.getElementById('links-list');
            list.innerHTML = 'Đang tải...';
            const snap = await db.collection('links').orderBy('createdAt', 'desc').get();
            list.innerHTML = '';
            snap.forEach(doc => {
                const div = document.createElement('div');
                div.className = "p-3 border-b flex justify-between items-center";
                div.innerHTML = `<span class="truncate max-w-xs">${doc.data().target}</span><button onclick="deleteLink('${doc.id}')" class="text-red-500 font-bold">Xóa</button>`;
                list.appendChild(div);
            });
        }

        window.deleteLink = async (id) => { if (confirm('Xóa?')) { await db.collection('links').doc(id).delete(); loadAdminLinks(); } };

        function showSection(name) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${name}-section`).classList.remove('hidden');
            if (name === 'admin') loadAdminLinks();
        }

        document.getElementById('copyBtn').onclick = () => {
            document.getElementById('shortUrlOutput').select();
            document.execCommand('copy');
            alert('Đã copy!');
        };
    </script>
</body>
</html>
